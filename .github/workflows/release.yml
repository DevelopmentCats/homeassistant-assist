name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Auto-release from CHANGELOG
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Check if new version was added to CHANGELOG
        id: changelog_check
        run: |
          # Check if CHANGELOG.md was modified in this push
          if ! git diff --name-only HEAD^ HEAD | grep -q '^CHANGELOG.md$'; then
            echo "CHANGELOG.md was not modified, skipping release"
            echo "modified=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Check if a new version entry was added (## [X.Y.Z] - YYYY-MM-DD)
          NEW_VERSION=$(git diff HEAD^ HEAD -- CHANGELOG.md | grep -oP '^\+## \[\K[0-9]+\.[0-9]+\.[0-9]+(?=\])' | head -1)
          
          if [ -z "$NEW_VERSION" ]; then
            echo "CHANGELOG.md was modified but no new version entry added (likely Unreleased section update)"
            echo "modified=false" >> $GITHUB_OUTPUT
            echo "new_version=" >> $GITHUB_OUTPUT
          else
            echo "New version entry added: $NEW_VERSION"
            echo "modified=true" >> $GITHUB_OUTPUT
            echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Extract latest version from CHANGELOG
        id: version
        if: steps.changelog_check.outputs.modified == 'true'
        run: |
          # Extract the first version after [Unreleased] (format: ## [X.Y.Z] - YYYY-MM-DD)
          VERSION=$(grep -oP '(?<=## \[)[0-9]+\.[0-9]+\.[0-9]+(?=\])' CHANGELOG.md | head -1)
          
          if [ -z "$VERSION" ]; then
            echo "No version found in CHANGELOG.md"
            echo "found=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "Latest version in CHANGELOG: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "found=true" >> $GITHUB_OUTPUT

      - name: Get latest git tag
        id: latest_tag
        if: steps.changelog_check.outputs.modified == 'true' && steps.version.outputs.found == 'true'
        run: |
          # Get the latest tag (sorted by version, strict vX.Y.Z format only)
          LATEST_TAG=$(git tag -l 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)
          
          if [ -z "$LATEST_TAG" ]; then
            echo "No existing tags found (first release)"
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "version=0.0.0" >> $GITHUB_OUTPUT
          else
            echo "Latest tag: $LATEST_TAG"
            # Strip 'v' prefix
            TAG_VERSION="${LATEST_TAG#v}"
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "version=$TAG_VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Validate version increment
        if: steps.changelog_check.outputs.modified == 'true' && steps.version.outputs.found == 'true' && steps.latest_tag.outputs.exists == 'true'
        run: |
          CHANGELOG_VERSION="${{ steps.version.outputs.version }}"
          LATEST_VERSION="${{ steps.latest_tag.outputs.version }}"
          
          echo "Comparing: $LATEST_VERSION → $CHANGELOG_VERSION"
          
          # Parse version numbers
          IFS='.' read -r LATEST_MAJOR LATEST_MINOR LATEST_PATCH <<< "$LATEST_VERSION"
          IFS='.' read -r NEW_MAJOR NEW_MINOR NEW_PATCH <<< "$CHANGELOG_VERSION"
          
          # Check for backwards version
          if [ "$NEW_MAJOR" -lt "$LATEST_MAJOR" ]; then
            echo "❌ ERROR: Version goes backwards (major: $LATEST_MAJOR → $NEW_MAJOR)"
            exit 1
          elif [ "$NEW_MAJOR" -eq "$LATEST_MAJOR" ] && [ "$NEW_MINOR" -lt "$LATEST_MINOR" ]; then
            echo "❌ ERROR: Version goes backwards (minor: $LATEST_MINOR → $NEW_MINOR)"
            exit 1
          elif [ "$NEW_MAJOR" -eq "$LATEST_MAJOR" ] && [ "$NEW_MINOR" -eq "$LATEST_MINOR" ] && [ "$NEW_PATCH" -le "$LATEST_PATCH" ]; then
            echo "❌ ERROR: Version does not increment (patch: $LATEST_PATCH → $NEW_PATCH)"
            exit 1
          fi
          
          # Validate increment type
          if [ "$NEW_MAJOR" -gt "$LATEST_MAJOR" ]; then
            echo "✅ Valid major version bump: $LATEST_VERSION → $CHANGELOG_VERSION"
          elif [ "$NEW_MINOR" -gt "$LATEST_MINOR" ]; then
            echo "✅ Valid minor version bump: $LATEST_VERSION → $CHANGELOG_VERSION"
          else
            # Patch bump - check if we skipped versions
            PATCH_DIFF=$((NEW_PATCH - LATEST_PATCH))
            if [ "$PATCH_DIFF" -gt 1 ]; then
              echo "⚠️  WARNING: Skipped patch versions ($LATEST_VERSION → $CHANGELOG_VERSION, skipped $((PATCH_DIFF - 1)) version(s))"
              echo "This is allowed but unusual. Proceeding..."
            else
              echo "✅ Valid patch version bump: $LATEST_VERSION → $CHANGELOG_VERSION"
            fi
          fi

      - name: Check if tag already exists
        id: tag_check
        if: steps.changelog_check.outputs.modified == 'true' && steps.version.outputs.found == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Tag v$VERSION does not exist"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract changelog for version
        id: changelog
        if: steps.changelog_check.outputs.modified == 'true' && steps.version.outputs.found == 'true' && steps.tag_check.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "Looking for changelog section: [$VERSION]"
          
          # Extract section between ## [VERSION] and next ## [ or end of file
          CHANGELOG=$(awk -v ver="$VERSION" '
            BEGIN { found=0 }
            /^## \[Unreleased\]/ { next }
            /^## \[/ {
              if (found) { exit }
              if (index($0, "[" ver "]")) { found=1; next }
            }
            found && /^[^#]/ { print }
            found && /^### / { print }
          ' CHANGELOG.md | sed '/^$/d' | head -50)
          
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="Release v$VERSION"
            echo "No changelog found, using default"
          else
            echo "Found changelog:"
            echo "$CHANGELOG"
          fi
          
          # Write to file to avoid escaping issues
          echo "$CHANGELOG" > /tmp/changelog.txt

      - name: Setup Node.js
        if: steps.changelog_check.outputs.modified == 'true' && steps.version.outputs.found == 'true' && steps.tag_check.outputs.exists == 'false'
        uses: actions/setup-node@0a44ba7841725637a19e28fa30b79a866c81b0a6 # v4
        with:
          node-version: '20'

      - name: Install ClawHub CLI
        if: steps.changelog_check.outputs.modified == 'true' && steps.version.outputs.found == 'true' && steps.tag_check.outputs.exists == 'false'
        run: npm install -g clawhub

      - name: Publish to ClawHub
        if: steps.changelog_check.outputs.modified == 'true' && steps.version.outputs.found == 'true' && steps.tag_check.outputs.exists == 'false'
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          clawhub login --token "$CLAWHUB_TOKEN" --no-browser
          CHANGELOG=$(cat /tmp/changelog.txt)
          clawhub publish . \
            --slug homeassistant-assist \
            --name "Home Assistant Assist" \
            --version "${{ steps.version.outputs.version }}" \
            --changelog "$CHANGELOG"

      - name: Create git tag
        if: steps.changelog_check.outputs.modified == 'true' && steps.version.outputs.found == 'true' && steps.tag_check.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"

      - name: Create GitHub Release
        if: steps.changelog_check.outputs.modified == 'true' && steps.version.outputs.found == 'true' && steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@c062e08bd532815e2082a85e87e3ef29c3e6d191 # v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          body_path: /tmp/changelog.txt
          generate_release_notes: false

      - name: Summary
        if: steps.changelog_check.outputs.modified == 'true' && steps.version.outputs.found == 'true' && steps.tag_check.outputs.exists == 'false'
        run: |
          echo "## ✅ Published homeassistant-assist@${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**ClawHub:** https://clawhub.com/skills/homeassistant-assist" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Changelog" >> $GITHUB_STEP_SUMMARY
          cat /tmp/changelog.txt >> $GITHUB_STEP_SUMMARY

      - name: Skip (tag exists)
        if: steps.changelog_check.outputs.modified == 'true' && steps.version.outputs.found == 'true' && steps.tag_check.outputs.exists == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "## ⏭️ Skipped" >> $GITHUB_STEP_SUMMARY
          echo "Tag v$VERSION already exists. No action needed." >> $GITHUB_STEP_SUMMARY

      - name: Skip (no version)
        if: steps.changelog_check.outputs.modified == 'true' && steps.version.outputs.found == 'false'
        run: |
          echo "## ⏭️ Skipped" >> $GITHUB_STEP_SUMMARY
          echo "No versioned release found in CHANGELOG.md (only [Unreleased] section exists)." >> $GITHUB_STEP_SUMMARY

      - name: Skip (no new version)
        if: steps.changelog_check.outputs.modified == 'false'
        run: |
          echo "## ⏭️ Skipped" >> $GITHUB_STEP_SUMMARY
          echo "No new version entry added to CHANGELOG.md." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This could be because:" >> $GITHUB_STEP_SUMMARY
          echo "- CHANGELOG.md was not modified" >> $GITHUB_STEP_SUMMARY
          echo "- Only the Unreleased section was updated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To trigger a release, add a new versioned entry (e.g., \`## [1.2.0] - YYYY-MM-DD\`)" >> $GITHUB_STEP_SUMMARY
